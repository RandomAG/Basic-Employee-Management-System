# =============================================================================
#  Employee Management System - Application Configuration
#  Spring Boot 4.x | MySQL 8.x | Port 8081
# =============================================================================

# ── Application Identity ─────────────────────────────────────────────────────
spring.application.name=ems-backend

# ── Server Configuration ─────────────────────────────────────────────────────
# Port 8080 is reserved by Oracle TNSLSNR on this machine; using 8081 instead.
server.port=8081

# ── MySQL DataSource ─────────────────────────────────────────────────────────
# Update the schema name, username, and password to match your local MySQL setup.
spring.datasource.url=jdbc:mysql://localhost:3306/ems_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=ayug345dpsn#
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection Pool (HikariCP - Spring Boot default) ─────────────────────────
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
# 'update'  → Hibernate auto-creates/alters tables from entities on startup.
# Switch to 'validate' or 'none' in production, manage schema via Flyway/Liquibase.
spring.jpa.hibernate.ddl-auto=update
# Run data.sql AFTER Hibernate has created/updated the schema (required when using ddl-auto)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.net.emsayush.ems_backend=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
